<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Cyberbullying</title>
    <style>
        #nav {
            height: 60px;
            color: #d34617;
            display: flex;
            width: 100%;
            padding: 0px;
            margin: 0px;
            
            justify-content: center;
        }
        #nav h1 {
            padding-left: 10px;
            vertical-align: top;
        }
        a {
            color: #d34617;
            text-decoration: none;
            text-align: center;
        }
        body {
            background-color: #e5e5e5;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-weight: 700;
        }
        p {
            display: block;
            justify-content: center;
            max-width: 40%;
            text-align: center;
            transform: translateX(80%);
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <div id="nav">
        <img src="https://sergoum.github.io/cyberbullying_project/costeas-geitonas-school-cgs-pallini-greece.jpg" height="60px">
        <a href="https://sergoum.github.io/cyberbullying_project/" id="home"><h1>Αρχική</h1></a><h1>|</h1>
        <a href="https://sergoum.github.io/cyberbullying_project/page1/" id="1"><h1>Τι είναι;</h1></a><h1>|</h1>
        <a href="https://sergoum.github.io/cyberbullying_project/page2/" id="2"><h1>Συμπτώματα</h1></a><h1>|</h1>
        <a href="https://sergoum.github.io/cyberbullying_project/page3/" id="3"><h1>Αντιμετώπιση</h1></a><h1>|</h1>
    </div>
    <div id="title">
        <h1 style="text-align: center; font-size: 72px;">Τι είναι;</h1>
        <br>
        <br>
    </div>
    <div><p>Tο cyberbullying είναι μια μορφή εκφοβισμού που χρησιμοποιεί μέσα κοινωνική δικτύωσης. Περιλαμβάνει την κοινοποίηση προσωπικών πληροφοριών άλλων, καθώς και τον εξευτελισμό τους.</p></div>
    <div id="mode"><img src="https://sergoum.github.io/cyberbullying_project/dark.png" width="40px" style="position: fixed; bottom: 10px;"></div>
    
    
    <script>
        var mode = "light"
        $("#home").mouseenter(function() {
        var j = $("#home").children()
        j.css("color", "#0b99e5")
        })
        $("#home").mouseleave(function() {
            var j = $("#home").children()
            j.css("color", "#d34617")
        })
        $("#1").mouseenter(function() {
            var j = $("#1").children()
            j.css("color", "#0b99e5")
        })
        $("#1").mouseleave(function() {
            var j = $("#1").children()
            j.css("color", "#d34617")
        })
        $("#2").mouseenter(function() {
            var j = $("#2").children()
            j.css("color", "#0b99e5")
        })
        $("#2").mouseleave(function() {
            var j = $("#2").children()
            j.css("color", "#d34617")
        })
        $("#3").mouseenter(function() {
            var j = $("#3").children()
            j.css("color", "#0b99e5")
        })
        $("#3").mouseleave(function() {
            var j = $("#3").children()
            j.css("color", "#d34617")
        })
        
        $("#mode").click(function() {
            if(document.cookie === "mode=dark") {
                $("h1").css("color", "#000000")
                $("#nav h1").css("color", "#d34617")
                $("p").css("color", "#000000")
                $("#mode").css("content", "url(https://sergoum.github.io/cyberbullying_project/dark.png)")
                $("#mode").css("width", "40px")
                $("#mode").css("position", "fixed")
                $("#mode").css("bottom", "10px")
                $("body").css("background-color", "#e5e5e5")
                document.cookie = "mode=light"
            } else {
                $("h1").css("color", "#ffffff")
                $("#nav h1").css("color", "#d34617")
                $("p").css("color", "#ffffff")
                $("#mode").css("content", "url(https://sergoum.github.io/cyberbullying_project/light.png)") 
                $("#mode").css("width", "40px")
                $("#mode").css("position", "fixed")
                $("#mode").css("bottom", "10px")
                $("body").css("background-color", "#151515")
                document.cookie = "mode=dark"
            }
        })
    </script>
</body>
</html>
